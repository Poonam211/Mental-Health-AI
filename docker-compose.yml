version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - JWT_SECRET=production-ready-clinical-secret-key-change-me-in-prod
      # If you want to use PostgreSQL, you can configure it here:
      # - DATABASE_URL=postgresql://user:password@db:5432/mental_health
    volumes:
      # Persist SQLite database and CSV reports locally across container restarts
      - ./data:/app/data
    restart: always
